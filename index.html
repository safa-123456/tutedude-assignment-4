<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Access Form</title>

  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>


  <div class="bg-grid" aria-hidden="true"></div>

  <main class="page">
    <div class="form-shell">

      
      

      <section class="form-card" aria-labelledby="formTitle">
        <header class="form-card__header">
          <h1 class="form-card__title" id="formTitle">Create your account</h1>
         
        </header>

       
        <div class="banner banner--error" id="errorBanner" role="alert" hidden></div>
        <div class="banner banner--success" id="successBanner" role="status" hidden></div>

        <form id="registrationForm" novalidate>

      
          <div class="field">
            <label for="fullName">Full name <span class="required-mark">*</span></label>
            <input type="text" id="fullName" name="fullName" placeholder="lily lala " autocomplete="name" />
            <p class="field-error" id="fullNameError"></p>
          </div>

          
          <div class="field">
            <label for="email">Email address <span class="required-mark">*</span></label>
            <input type="text" id="email" name="email" placeholder="alily@example.com" autocomplete="email" />
            <p class="field-error" id="emailError"></p>
          </div>

       
          <div class="field">
            <label for="phone">Phone number <span class="required-mark">*</span></label>
            <input type="text" id="phone" name="phone" placeholder="10 digit number" autocomplete="tel" inputmode="numeric" maxlength="10" />
            <p class="field-error" id="phoneError"></p>
          </div>

         
          <div class="field">
            <label for="password">Password <span class="required-mark">*</span></label>
            <div class="password-wrap">
              <input type="password" id="password" name="password" placeholder="Create a strong password" autocomplete="new-password" />
              <button type="button" class="toggle-visibility" id="togglePassword" aria-label="Show password" aria-pressed="false">
                <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
                  <circle cx="12" cy="12" r="3.2"/>
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" hidden>
                  <path d="M3 3l18 18"/>
                  <path d="M10.6 5.2A10.6 10.6 0 0 1 12 5c7 0 10.5 7 10.5 7a13.4 13.4 0 0 1-3.15 4.09M6.5 6.6C3.4 8.5 1.5 12 1.5 12s3.5 7 10.5 7c1.4 0 2.66-.28 3.77-.75"/>
                  <path d="M9.9 9.9a3.2 3.2 0 0 0 4.2 4.2"/>
                </svg>
              </button>
            </div>

            
            <div class="strength-meter" id="strengthMeter" aria-hidden="true">
              <span class="strength-seg" data-seg="1"></span>
              <span class="strength-seg" data-seg="2"></span>
              <span class="strength-seg" data-seg="3"></span>
              <span class="strength-seg" data-seg="4"></span>
            </div>
            <p class="field-error" id="passwordError"></p>
          </div>

          
          <div class="field">
            <label for="confirmPassword">Confirm password <span class="required-mark">*</span></label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" autocomplete="new-password" />
            <p class="field-error" id="confirmPasswordError"></p>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <span>Create account</span>
          </button>
        </form>
      </section>
    </div>
  </main>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
